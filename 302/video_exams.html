<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iStudy - Exam Video Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/react-markdown@8.0.7/react-markdown.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        console.log("Video Exam Portal script initialized.");
        const { motion, AnimatePresence } = window.Motion || { motion: (p) => <div {...p} />, AnimatePresence: (p) => p.children };

        // Core and Fetch Logic
        window.Core = window.Core || {
            VerifyStudentEmail: async (email) => {
                const scriptUrl = 'https://script.google.com/macros/s/AKfycbyQzVHshuJBvNCamovpsPB9tYy6F2RQ76gqRgwiyhh8yq1jnrBiM1YCAN1oZkeFHBwkuA/exec';
                const url = `${scriptUrl}?action=send-code&email=${encodeURIComponent(email)}`;
                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    return data;
                } catch (err) {
                    return { status: 'error', message: err.toString() };
                }
            },
            VerifyOTP: async (email, code) => {
                const scriptUrl = 'https://script.google.com/macros/s/AKfycbyQzVHshuJBvNCamovpsPB9tYy6F2RQ76gqRgwiyhh8yq1jnrBiM1YCAN1oZkeFHBwkuA/exec';
                const url = `${scriptUrl}?action=verify-code&email=${encodeURIComponent(email)}&code=${encodeURIComponent(code)}`;
                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    return data;
                } catch (err) {
                    return { status: 'error', message: err.toString() };
                }
            },
            FetchRoadmapData: async (email) => {
                const scriptUrl = 'https://script.google.com/macros/s/AKfycbyQzVHshuJBvNCamovpsPB9tYy6F2RQ76gqRgwiyhh8yq1jnrBiM1YCAN1oZkeFHBwkuA/exec';
                const url = `${scriptUrl}?action=get-status&email=${encodeURIComponent(email)}`;
                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    return data;
                } catch (err) {
                    console.error("Fetch Roadmap Error:", err);
                    throw err;
                }
            }
        };

        function App() {
            const [view, setView] = useState('video_portal');
            const [showSettings, setShowSettings] = useState(false);
            const [apiKeys, setApiKeys] = useState([]);
            const [tempKey, setTempKey] = useState('');
            const [extraKeys, setExtraKeys] = useState([]);

            const [videoCheckEmail, setVideoCheckEmail] = useState(() => {
                return new URLSearchParams(window.location.search).get('email') || '';
            });

            // Redirect if no email provided
            useEffect(() => {
                if (!videoCheckEmail) {
                    window.location.href = 'index.html';
                }
            }, [videoCheckEmail]);

            const [videoRows, setVideoRows] = useState([
                { chapter: '', url: '' }, { chapter: '', url: '' }, { chapter: '', url: '' },
                { chapter: '', url: '' }, { chapter: '', url: '' }, { chapter: '', url: '' }
            ]);
            const [isVideoSubmitting, setIsVideoSubmitting] = useState(false);
            const [showVideoSuccess, setShowVideoSuccess] = useState(false);
            const [finalProjectedGrade, setFinalProjectedGrade] = useState('');
            const [roadmapData, setRoadmapData] = useState(null);

            // Load roadmap data for the scoreboard if needed (optional since we have student email)
            useEffect(() => {
                if (videoCheckEmail) {
                    window.Core.FetchRoadmapData(videoCheckEmail).then(res => {
                        if (res.status === 'success') {
                            setRoadmapData(res.completion);
                        }
                    }).catch(console.error);
                }
            }, [videoCheckEmail]);

            // Load saved key on mount
            useEffect(() => {
                const raw = localStorage.getItem('google_api_key');
                if (raw) {
                    try {
                        const parsed = JSON.parse(raw);
                        if (Array.isArray(parsed)) setApiKeys(parsed);
                        else setApiKeys([{ key: raw, label: 'Default' }]);
                    } catch {
                        setApiKeys([{ key: raw, label: 'Default' }]);
                    }
                }
            }, []);

            const addVideoRow = () => {
                setVideoRows([...videoRows, { chapter: '', url: '' }]);
            };

            const removeVideoRow = (idx) => {
                const updated = videoRows.filter((_, i) => i !== idx);
                setVideoRows(updated.length > 0 ? updated : [{ chapter: '', url: '' }]);
            };

            const updateVideoRow = (index, field, value) => {
                const NewRows = [...videoRows];
                NewRows[index][field] = value;
                setVideoRows(NewRows);
            };

            const calculateVideoGrade = () => {
                const filledCount = videoRows.filter(r => r.chapter && r.url.trim().length > 10).length;
                if (filledCount >= 10) return 'A+';
                if (filledCount >= 8) return 'A';
                if (filledCount >= 6) return 'A-';
                return 'B+';
            };

            const handleVideoSubmit = async () => {
                console.log("Submit button clicked. Total rows:", videoRows.length);
                if (isVideoSubmitting) return;
                const filledRows = videoRows.filter(r => r.chapter && r.url.trim().length > 10);
                console.log("Valid rows count:", filledRows.length);
                const chapters = filledRows.map(r => r.chapter);
                const urls = filledRows.map(r => r.url.trim().toLowerCase());

                if (new Set(chapters).size !== chapters.length) {
                    alert("⚠️ Duplicate Chapters: You have selected the same chapter more than once.");
                    return;
                }
                if (new Set(urls).size !== urls.length) {
                    alert("⚠️ Duplicate URLs: You have entered the same video URL more than once.");
                    return;
                }
                if (filledRows.length < 6) {
                    alert("You need at least 6 videos to submit for an A bracket grade.");
                    return;
                }

                setIsVideoSubmitting(true);
                const grade = calculateVideoGrade();
                setFinalProjectedGrade(grade);

                try {
                    const VIDEO_SCRIPT_URL = "https://script.google.com/a/macros/hawaii.edu/s/AKfycbw-kZ9z4ME-TpV4br_UPbAhGFd1MV9Umd6uwHWcNFeCXj3Jfvjf_wNEFFjnE7dZwn2V/exec";
                    const payload = {
                        email: videoCheckEmail,
                        studentId: videoCheckEmail, // Support for alternate script keys
                        finalGrade: grade, // Pass the calculated final grade to the script
                        videos: filledRows.map(r => ({
                            chapter: r.chapter.toString().padStart(2, '0'),
                            url: r.url
                        }))
                    };

                    console.log("Submitting payload to Google Script:", payload);

                    // We use mode: 'no-cors' for Google Apps Script POST requests
                    await fetch(VIDEO_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payload)
                    });

                    // Wait a bit for the operation to complete on the sheet
                    await new Promise(r => setTimeout(r, 1500));
                    setShowVideoSuccess(true);
                } catch (err) {
                    console.error("Submission error:", err);
                    alert("Error submitting videos. Please try again.");
                } finally {
                    setIsVideoSubmitting(false);
                }
            };


            return (
                <div className="app-root">
                    <header>
                        <div className="logo" onClick={() => window.location.href = 'index.html'} style={{ cursor: 'pointer' }}>IStudy <span style={{ fontSize: '0.5em', opacity: 0.6, verticalAlign: 'middle', fontWeight: 'normal' }}>Video Exam Portal</span></div>
                        <div className="settings-icon" onClick={() => (window.location.href = 'index.html')}>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" title="Back to Essays">
                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                                <polyline points="9 22 9 12 15 12 15 22"></polyline>
                            </svg>
                        </div>
                    </header>

                    <main className="container">
                        <AnimatePresence mode="wait">
                            {view === 'video_portal' && (
                                <motion.div key="video_portal" initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -20 }} className="video-portal-container">
                                    <div className="video-portal-header">
                                        <button className="back-link" onClick={() => window.location.href = 'index.html'}>← Back</button>
                                        <h2>Exam Video Portal</h2>
                                    </div>

                                    <div className="video-portal-layout">
                                        <div className="video-form-section">
                                            <div className="video-form-grid">
                                                <div className="grid-header">Chapter</div>
                                                <div className="grid-header">YouTube URL</div>
                                                <div className="grid-header"></div>
                                                {videoRows.map((row, idx) => (
                                                    <React.Fragment key={idx}>
                                                        <select
                                                            className="video-select"
                                                            value={row.chapter}
                                                            onChange={(e) => updateVideoRow(idx, 'chapter', e.target.value)}
                                                        >
                                                            <option value="">Select Chapter</option>
                                                            {[...Array(13)].map((_, i) => {
                                                                const chNum = (i + 1).toString();
                                                                const isAvailable = row.chapter === chNum || !videoRows.some(vr => vr.chapter === chNum);
                                                                if (!isAvailable) return null;
                                                                return <option key={chNum} value={chNum}>Chapter {chNum}</option>;
                                                            })}
                                                        </select>
                                                        <input
                                                            type="text"
                                                            className="video-input"
                                                            placeholder="https://www.youtube.com/watch?v=..."
                                                            value={row.url}
                                                            onChange={(e) => updateVideoRow(idx, 'url', e.target.value)}
                                                        />
                                                        <button className="remove-row-btn" onClick={() => removeVideoRow(idx)}>✕</button>
                                                    </React.Fragment>
                                                ))}
                                            </div>
                                            <button className="add-row-btn" onClick={addVideoRow}>+ Add Another Video</button>
                                            <div className="video-submit-wrapper">
                                                <button
                                                    className={`main-upload-btn ${isVideoSubmitting ? 'disabled' : ''}`}
                                                    onClick={handleVideoSubmit}
                                                    disabled={isVideoSubmitting}
                                                    style={{ width: '100%', justifyContent: 'center' }}
                                                >
                                                    {isVideoSubmitting ? "Submitting..." : "Submit Exam Portfolio"}
                                                </button>
                                            </div>
                                        </div>

                                        <div className="video-grade-section">
                                            <div className="grade-card-large">
                                                <div className="grade-header-top">
                                                    {videoRows.filter(r => r.chapter && r.url.trim().length > 10).length < 6
                                                        ? "Your current grade is"
                                                        : "Your projected grade in this class will be:"}
                                                </div>
                                                <div className="grade-letter-giant">{calculateVideoGrade()}</div>
                                                <div className="grade-footer-bottom">
                                                    {videoRows.filter(r => r.chapter && r.url.trim().length > 10).length < 6
                                                        ? "given 13 Q&A reports you submitted"
                                                        : "{pending review of the videos}"}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    {showVideoSuccess && (
                        <div className="modal-overlay">
                            <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="modal-content success-modal">
                                <h3>Submission Successful!</h3>
                                <p>Your final grade in this class is projected to be <strong>{finalProjectedGrade}</strong>.</p>
                                <button className="btn-primary" onClick={() => {
                                    setShowVideoSuccess(false);
                                    window.location.href = 'index.html';
                                }}>Confirm</button>
                            </motion.div>
                        </div>
                    )}

                    <footer className="landing-footer">
                        IStudy is an AI-powered essay review developed by <a href="https://github.com/Camilo-Mora" target="_blank">Camilo Mora, Ph.D.</a>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
